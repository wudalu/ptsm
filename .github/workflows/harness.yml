name: harness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Prepare local harness directories
        run: mkdir -p outputs/artifacts

      - name: Run harness-check on pull requests
        if: github.event_name == 'pull_request'
        run: >
          uv run python -m ptsm.bootstrap harness-check
          --base-ref "${{ github.event.pull_request.base.sha }}"
          --strict

      - name: Run harness-check on main pushes
        if: github.event_name == 'push'
        run: >
          uv run python -m ptsm.bootstrap harness-check
          --base-ref "${{ github.event.before }}"
          --strict
